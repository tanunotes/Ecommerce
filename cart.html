<!doctype html>
<html>
  <head>
    <title>Cart</title>

    <link rel="stylesheet" href="css/style.css" />

    <style>
      body {
        font-family: Arial;
        background: #f3f3f3;
        margin: 0;
      }

      h2 {
        padding: 20px;
      }

      .cart-container {
        padding: 20px;
      }

      .cart-item {
        display: flex;
        gap: 20px;
        background: white;
        margin-bottom: 15px;
        padding: 15px;
        border-radius: 8px;
        align-items: center;
      }

      .cart-item img {
        width: 100px;
        height: 100px;
        object-fit: contain;
      }

      .details {
        flex: 1;
      }

      .price {
        color: green;
        font-weight: bold;
        margin-top: 10px;
      }

      .remove-btn {
        background: red;
        color: white;
        border: none;
        padding: 6px 10px;
        cursor: pointer;
        border-radius: 5px;
      }

      #placeOrderBtn {
        background: rgb(83, 198, 83);
        color: white;
        font-size: 16px;
        border: none;
        padding: 12px 20px;
        border-radius: 6px;
        cursor: pointer;
        margin: 20px;
      }

      #placeOrderBtn:hover {
        opacity: 0.9;
      }

      .quantity-box {
        display: flex;
        align-items: center;
        gap: 10px;
        margin: 10px 0;
      }

      .quantity-box button {
        width: 30px;
        height: 30px;
        border: none;
        background: #ddd;
        cursor: pointer;
        font-size: 18px;
        border-radius: 5px;
      }

      .quantity-box span {
        font-weight: bold;
      }

      #totalAmount {
        padding: 20px;
        color: green;
      }
    </style>
  </head>

  <body>
    <h2>Your Cart 🛒</h2>

    <div class="cart-container" id="cartContainer"></div>

    <h3 id="totalAmount"></h3>

    <button id="placeOrderBtn">Place Order</button>

    <script>
      let cart = JSON.parse(localStorage.getItem("cart")) || [];

      const container = document.getElementById("cartContainer");

      // LOAD CART
      function loadCart() {
        container.innerHTML = "";

        let total = 0;

        if (cart.length === 0) {
          container.innerHTML = "<p style='padding:20px'>Cart is empty</p>";

          document.getElementById("totalAmount").innerText = "";

          return;
        }

        cart.forEach((item, index) => {
          // Convert ₹1200 → 1200
          const priceNumber = Number(item.price.replace("₹", ""));

          // Total for one item
          const itemTotal = priceNumber * (item.quantity || 1);

          // Cart total
          total += itemTotal;

          const div = document.createElement("div");

          div.className = "cart-item";

          div.innerHTML = `
            <img src="${item.img}">

            <div class="details">

              <h4>${item.title}</h4>

              <p>Size: ${item.size}</p>

              <div class="quantity-box">

                <button
                  onclick="decreaseQuantity(${index})">
                  -
                </button>

                <span>
                  ${item.quantity || 1}
                </span>

                <button
                  onclick="increaseQuantity(${index})">
                  +
                </button>

              </div>

              <div class="price">
                ₹${itemTotal}
              </div>

            </div>

            <button
              class="remove-btn"
              onclick="removeItem(${index})">

              Remove

            </button>
          `;

          container.appendChild(div);
        });

        // SHOW TOTAL AMOUNT
        document.getElementById("totalAmount").innerText =
          "Total Amount: ₹" + total;
      }

      // REMOVE ITEM
      function removeItem(index) {
        cart.splice(index, 1);

        localStorage.setItem("cart", JSON.stringify(cart));

        loadCart();
      }

      // INCREASE QUANTITY
      function increaseQuantity(index) {
        cart[index].quantity++;

        localStorage.setItem("cart", JSON.stringify(cart));

        loadCart();
      }

      // DECREASE QUANTITY
      function decreaseQuantity(index) {
        if (cart[index].quantity > 1) {
          cart[index].quantity--;
        } else {
          cart.splice(index, 1);
        }

        localStorage.setItem("cart", JSON.stringify(cart));

        loadCart();
      }

      // PLACE ORDER
      const placeOrderBtn = document.getElementById("placeOrderBtn");

      placeOrderBtn.addEventListener("click", () => {
        if (cart.length === 0) {
          alert("Cart is empty");
          return;
        }

        let orders = JSON.parse(localStorage.getItem("orders")) || [];

        cart.forEach((item) => {
          const priceNumber = Number(item.price.replace("₹", ""));

          const itemTotal = priceNumber * (item.quantity || 1);

          const orderItem = {
            title: item.title,

            price: "₹" + itemTotal,

            size: item.size,

            img: item.img,

            quantity: item.quantity,

            date: new Date().toLocaleDateString(),
          };

          orders.push(orderItem);
        });

        localStorage.setItem("orders", JSON.stringify(orders));

        // CLEAR CART
        cart = [];

        localStorage.setItem("cart", JSON.stringify(cart));

        loadCart();

        alert("Order placed successfully ✅");
      });

      // INITIAL LOAD
      loadCart();
    </script>
  </body>
</html>
