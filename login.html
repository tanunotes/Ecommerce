<!doctype html>
<html lang="en">
  <head>
    <title>Amazon Login</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f3f3f3;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .container {
        background-color: white;
        padding: 25px;
        width: 320px;
        border: 1px solid #ddd;
        border-radius: 8px;
      }

      .logo {
        text-align: center;
        margin-bottom: 20px;
        font-size: 28px;
        font-weight: bold;
      }

      h2 {
        margin-bottom: 15px;
        font-weight: normal;
      }

      label {
        font-size: 14px;
        font-weight: bold;
      }

      input {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
        margin-bottom: 15px;
        border: 1px solid #ccc;
        border-radius: 4px;
      }

      button {
        width: 100%;
        padding: 10px;
        background-color: #ffd814;
        border: none;
        border-radius: 20px;
        cursor: pointer;
        font-weight: bold;
      }

      button:hover {
        background-color: #f7ca00;
      }

      .terms {
        font-size: 12px;
        margin-top: 15px;
      }

      .divider {
        margin: 20px 0;
        border-top: 1px solid #ddd;
      }

      .business {
        font-size: 14px;
      }

      a {
        color: #0066c0;
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="logo">amazon.in</div>

      <h2>Sign in or create account</h2>

      <label>Enter mobile number or email</label>
      <input type="text" />
      <a href="index.html">
      <button>Continue</button>
      </a>
      <div class="terms">
        By continuing, you agree to Amazon's
        <a href="#">Conditions of Use</a> and <a href="#">Privacy Notice</a>.
      </div>

      <div class="divider"></div>

      <div class="business">
        <b>Buying for work?</b><br />
        <a href="#">Create a free business account</a>
      </div>
    </div>
  </body>
</html>
