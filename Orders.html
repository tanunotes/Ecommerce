<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orders</title>
    <style>
      body {
        font-family: Arial;
        background: #f3f3f3;
        margin: 0;
      }

      h2 {
        padding: 20px;
      }

      .orders-container {
        padding: 20px;
      }

      .order-item {
        display: flex;
        gap: 20px;
        background: white;
        margin-bottom: 15px;
        padding: 15px;
        border-radius: 8px;
        align-items: center;
      }

      .order-item img {
        width: 100px;
        height: 100px;
        object-fit: contain;
      }

      .details {
        flex: 1;
      }

      .price {
        color: green;
        font-weight: bold;
        margin-top: 10px;
      }

      #grandTotal {
        padding: 20px;
        color: green;
      }
    </style>
  </head>

  <body>
    <h2>Your Orders 📦</h2>

    <div class="orders-container" id="ordersContainer"></div>

    <h3 id="grandTotal"></h3>

    <script>
      let orders = JSON.parse(localStorage.getItem("orders")) || [];

      const container = document.getElementById("ordersContainer");

      function loadOrders() {
        container.innerHTML = "";

        let totalAmount = 0;

        // NO ORDERS
        if (orders.length === 0) {
          container.innerHTML =
            "<p style='padding:20px'>No orders placed yet</p>";

          document.getElementById("grandTotal").innerText = "";

          return;
        }

        orders.forEach((item) => {
          // PRICE NUMBER
          const priceNumber = Number(item.price.replace("₹", ""));

          // ITEM TOTAL
          const itemTotal = priceNumber * (item.quantity || 1);

          // GRAND TOTAL
          totalAmount += itemTotal;

          const div = document.createElement("div");

          div.className = "order-item";

          div.innerHTML = `
            <img src="${item.img}">

            <div class="details">

              <h4>${item.title}</h4>

              <p>
                quantity:
                ${item.quantity || 1}
              </p>

              <p>
                Size:
                ${item.size}
              </p>

              <div class="price">
                Total: ₹${itemTotal}
              </div>

              <p>
                Ordered on
                ${item.date}
              </p>

            </div>
          `;

          container.appendChild(div);
        });

        // SHOW GRAND TOTAL
        document.getElementById("grandTotal").innerText =
          "Total Ordered Amount: ₹" + totalAmount;
      }

      loadOrders();
    </script>
  </body>
</html>
