<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orders</title>
    <style>
      body {
        font-family: Arial;
        background: #f3f3f3;
        margin: 0;
      }

      h2 {
        padding: 20px;
      }

      .orders-container {
        padding: 20px;
      }

      .order-item {
        display: flex;
        gap: 20px;
        background: white;
        margin-bottom: 15px;
        padding: 15px;
        border-radius: 8px;
        align-items: center;
      }

      .order-item img {
        width: 100px;
        height: 100px;
        object-fit: contain;
      }

      .details {
        flex: 1;
      }
      .price {
        color: green;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <h2>Your Orders</h2>
    <div class="orders-container" id="ordersContainer"></div>

    <script>
      let orders = JSON.parse(localStorage.getItem("orders")) || [];
      const container = document.getElementById("ordersContainer");

      function loadOrders() {
        container.innerHTML = "";
        if (orders.length === 0) {
          container.innerHTML = "<p>No orders placed yet</p>";

          return;
        }

        orders.forEach((item) => {
          const div = document.createElement("div");
          div.className = "order-item";

          div.innerHTML = `
                   <img src="${item.img}"> 
                   <div class="details"> 
                   <h4>${item.title}</h4> 
                   <p>Size: ${item.size}</p> 
                   <div class="price"> ${item.price} </div>
                   </div>
                `;

          container.appendChild(div);
        });
      }
      loadOrders();
    </script>
  </body>
</html>
