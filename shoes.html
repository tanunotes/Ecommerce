<!doctype html>
<html>
  <head>
    <title>Shoes</title>
    <script src="js/script.js" defer></script>
    <style>
      body {
        font-family: Arial;
        background: #f3f3f3;
        margin: 0;
      }

      h2 {
        padding: 20px;
      }

      .products {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 20px;
        padding: 20px;
      }

      .card {
        background: white;
        padding: 15px;
        border-radius: 8px;
        text-align: center;
      }

      .card img {
        width: 100%;
        height: 150px;
        object-fit: contain;
      }

      .title {
        font-size: 14px;
        margin: 10px 0;
      }

      .price {
        color: green;
        font-weight: bold;
      }

      .rating {
        color: orange;
      }

      button {
        margin-top: 10px;
        background: #ffd814;
        border: none;
        padding: 8px 12px;
        cursor: pointer;
        border-radius: 20px;
      }

      button:hover {
        background: #f7ca00;
      }
      .back-btn {
        margin: 20px;
        padding: 8px 15px;
        background: #232f3e;
        color: white;
        border: none;
        cursor: pointer;
        border-radius: 5px;
      }

      .back-btn:hover {
        background: #37475a;
      }
    </style>
    <script>
      function goBack() {
        window.history.back();
      }
    </script>
  </head>

  <body>
    <button class="back-btn" onclick="goBack()">⬅ Back</button>
    <h2>Shoes</h2>
    <div class="products">
      <!-- Card 1 -->
      <div class="card" onclick="openProduct(1)">
        <img src="Images/Athco1209.jpg" />
        <div class="title">Running Shoes for Men</div>
        <div class="rating">⭐⭐⭐⭐☆</div>
        <div class="price">₹1209</div>
        <button>click here for more details</button>
      </div>

      <!-- Card 2 -->
      <div class="card" onclick="openProduct(2)">
        <img src="Images/Boldfit.jpg" />
        <div class="title">Boldfit Trekking Shoes</div>
        <div class="rating">⭐⭐⭐⭐⭐</div>
        <div class="price">₹1999</div>
        <button>click here for more details</button>
      </div>

      <!-- Card 3 -->
      <div class="card" onclick="openProduct(3)">
        <img src="Images/campus799.jpg" />
        <div class="title">Campus fit</div>
        <div class="rating">⭐⭐⭐⭐☆</div>
        <div class="price">₹799</div>
        <button>click here for more details</button>
      </div>

      <!-- Card 4 -->
      <div class="card" onclick="openProduct(4)">
        <img src="Images/sneaker663.jpg" />
        <div class="title">SPARX Men's Sneaker</div>
        <div class="rating">⭐⭐⭐⭐⭐</div>
        <div class="price">₹663</div>
        <button>click here for more details</button>
      </div>
    </div>
  </body>
</html>
