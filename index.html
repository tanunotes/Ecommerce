<!doctype html>
<html>
  <head>
    <title>Amazon</title>
    <link rel="stylesheet" href="css/style.css" />

    <!-- Move script to bottom OR use defer -->
    <script src="js/script.js" defer></script>
  </head>

  <body>
    <!-- NAVBAR -->
    <header class="navbar">
      <div class="logo">Amazon</div>

      <div class="search">
        <input type="text" placeholder="Search products..." />
        <button>Search</button>
      </div>

      <div class="nav-links">
        <a href="login.html">Login</a>
        <a href="Orders.html">Orders</a>
        <a href="cart.html" class="cart">Cart (0)</a>
      </div>
    </header>

    <!-- MENU -->
    <nav class="menu">
      <span>All</span>
      <span>Electronics</span>
      <span>Clothing</span>
      <span>Home</span>
      <span>Appliances</span>
    </nav>

    <!-- SLIDER -->
    <section class="slider">
      <button class="prev">&#10094;</button>
      <img id="sliderImage" src="Images/shirt.jpg" />
      <button class="next">&#10095;</button>
    </section>

    <!-- MAIN -->
    <main id="mainContent">
      <div class="container">
        <!-- Appliances -->
        <div class="section">
          <h2>Appliances</h2>
          <div class="grid">
            <div class="item">
              <img src="Images/ac.jpg" />
              <p>AC</p>
            </div>
            <div class="item">
              <img src="Images/fridge.jpg" />
              <p>Fridge</p>
            </div>
            <div class="item">
              <img src="Images/microwave.jpg" />
              <p>Microwave</p>
            </div>
            <div class="item">
              <img src="Images/wm.jpg" />
              <p>Washing Machine</p>
            </div>
          </div>
        </div>

        <!-- Electronics -->
        <div class="section">
          <h2>Electronics</h2>
          <div class="grid">
            <div class="item">
              <img src="Images/phones.jpg" />
              <p>Mobiles</p>
            </div>
            <div class="item">
              <img src="Images/laptop.jpg" />
              <p>Laptops</p>
            </div>
            <div class="item">
              <img src="Images/headphones.jpg" />
              <p>Headphones</p>
            </div>
            <div class="item">
              <img src="Images/camera.png" />
              <p>Camera</p>
            </div>
          </div>
        </div>

        <!-- Clothing -->
        <div class="section">
          <h2>Clothing</h2>
          <div class="grid">
            <div class="item">
              <img src="Images/shirt.jpg" />
              <p>T-Shirts</p>
            </div>
            <div class="item">
              <img src="Images/jeans.jpg" />
              <p>Jeans</p>
            </div>
            <div class="item">
              <!-- clickable shoes -->
              <img src="Images/shoe.jpg" onclick="openShoespage()" />
              <p>Shoes</p>
            </div>
            <div class="item">
              <img src="Images/jacket.jpg" />
              <p>Jackets</p>
            </div>
          </div>
        </div>

        <!-- Home Decor -->
        <div class="section">
          <h2>Home Decor</h2>
          <div class="grid">
            <div class="item">
              <img src="Images/lights.jpg" />
              <p>Lights</p>
            </div>
            <div class="item">
              <img src="Images/furniture.jpg" />
              <p>Furniture</p>
            </div>
            <div class="item">
              <img src="Images/walld.jpg" />
              <p>Wall Art</p>
            </div>
            <div class="item">
              <img src="Images/decor.webp" />
              <p>Decor</p>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer>
      <p>© 2026 Amazon Clone</p>
    </footer>
  </body>
</html>
